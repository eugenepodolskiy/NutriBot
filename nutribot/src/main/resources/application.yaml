spring:
  application:
    name: nutribot
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nutribot}
    username: ${DB_USER:nutribot}
    password: ${DB_PASSWORD:nutribot}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME:}

gemini:
  api:
    key: ${GEMINI_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${PORT:8080}
